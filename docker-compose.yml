version: '3.8'
services:
  app:
    build: .
    container_name: foodmaster_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/foodmaster
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      - db

  db:
    image: mysql:8.4.7
    container_name: foodmaster_mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: foodmaster
      MYSQL_USER: admin
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3306:3306"
